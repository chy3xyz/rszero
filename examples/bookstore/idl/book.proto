syntax = "proto3";
package bookstore.book;

service BookService {
    rpc GetBook(GetBookReq) returns (Book);
    rpc ListBooks(ListBooksReq) returns (ListBooksResp);
    rpc CreateBook(CreateBookReq) returns (Book);
    rpc UpdateBook(UpdateBookReq) returns (Book);
    rpc DeleteBook(DeleteBookReq) returns (DeleteBookResp);
}

message Book {
    string id = 1;
    string title = 2;
    string author = 3;
    double price = 4;
    int32 stock = 5;
    string isbn = 6;
    string category = 7;
    int64 created_at = 8;
    int64 updated_at = 9;
}

message GetBookReq {
    string id = 1;
}

message ListBooksReq {
    string category = 1;
    int32 page = 2;
    int32 page_size = 3;
}

message ListBooksResp {
    repeated Book books = 1;
    int32 total = 2;
    int32 page = 3;
    int32 page_size = 4;
}

message CreateBookReq {
    string title = 1;
    string author = 2;
    double price = 3;
    string isbn = 4;
    string category = 5;
    int32 stock = 6;
}

message UpdateBookReq {
    string id = 1;
    string title = 2;
    string author = 3;
    double price = 4;
    int32 stock = 5;
}

message DeleteBookReq {
    string id = 1;
}

message DeleteBookResp {
    bool success = 1;
}
