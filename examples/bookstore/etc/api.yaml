Name: bookstore-api
Host: 0.0.0.0
Port: 8080
Log:
  Level: info
  Format: json
Cache:
  Host: 127.0.0.1
  Port: 6379
  Db: 0
  PoolSize: 10
Store:
  Dsn: "postgres://postgres:postgres@localhost:5432/bookstore"
  MaxConnections: 10
  MinConnections: 2
Discovery:
  Kind: etcd
  Endpoints:
    - 127.0.0.1:2379
