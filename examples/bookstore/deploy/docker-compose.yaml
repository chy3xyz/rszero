#!/bin/bash
# Bookstore Microservice System - Docker Compose
# Starts all services: API Gateway, Book RPC, Order RPC, PostgreSQL, Redis, etcd

version: '3.8'

services:
  etcd:
    image: bitnami/etcd:latest
    ports:
      - "2379:2379"
    environment:
      - ALLOW_NONE_AUTHENTICATION=yes

  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"

  postgres:
    image: postgres:16-alpine
    ports:
      - "5432:5432"
    environment:
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: bookstore

  book-rpc:
    build:
      context: ../..
      dockerfile: examples/bookstore/deploy/Dockerfile.book-rpc
    ports:
      - "8081:8081"
    depends_on:
      - etcd
      - redis
      - postgres
    environment:
      - RUST_LOG=info

  order-rpc:
    build:
      context: ../..
      dockerfile: examples/bookstore/deploy/Dockerfile.order-rpc
    ports:
      - "8082:8082"
    depends_on:
      - etcd
      - redis
      - postgres
      - book-rpc
    environment:
      - RUST_LOG=info

  api-gateway:
    build:
      context: ../..
      dockerfile: examples/bookstore/deploy/Dockerfile.api
    ports:
      - "8080:8080"
    depends_on:
      - book-rpc
      - order-rpc
    environment:
      - RUST_LOG=info
